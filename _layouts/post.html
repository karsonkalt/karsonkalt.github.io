---
layout: base
---

<main class="pt-14 pb-24">

  <div class="mb-10 flex items-center justify-between">
    <a href="{{ '/' | relative_url }}"
       class="inline-flex items-center gap-2 text-muted text-sm no-underline hover:text-w-70 transition-colors duration-150">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Karson Kalt
    </a>
    <div class="dropdown-menu relative select-none" tabindex="0">
      <button class="icon-btn" aria-label="Appearance" aria-haspopup="true" aria-controls="appearance-menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m14.622 17.897-10.68-2.913"/><path d="M18.376 2.622a1 1 0 1 1 3.002 3.002L17.36 9.643a.5.5 0 0 0 0 .707l.944.944a2.41 2.41 0 0 1 0 3.408l-.944.944a.5.5 0 0 1-.707 0L8.354 7.348a.5.5 0 0 1 0-.707l.944-.944a2.41 2.41 0 0 1 3.408 0l.944.944a.5.5 0 0 0 .707 0z"/><path d="M9 8c-1.804 2.71-3.97 3.46-6.583 3.948a.507.507 0 0 0-.302.819l7.32 8.883a1 1 0 0 0 1.185.204C12.735 20.405 16 16.792 16 15"/>
        </svg>
      </button>
      <div id="appearance-menu" class="dropdown-content hidden flex-col absolute right-0 top-[calc(100%+6px)] min-w-44 bg-b-40 backdrop-blur-lg shadow-xl z-10 overflow-hidden origin-top-right rounded-sm" role="menu" style="animation: grow 200ms;">
        <button id="theme-toggle" class="flex items-center gap-3 px-4 py-3 text-sm text-primary border-b border-w-10 hover:bg-w-05 transition-colors duration-100 w-full cursor-pointer" role="menuitem">
          <svg class="icon-sun shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <span class="icon-sun">Light mode</span>
          <span class="icon-moon">Dark mode</span>
        </button>
        <button id="color-swatch" class="flex items-center gap-3 px-4 py-3 text-sm text-primary hover:bg-w-05 transition-colors duration-100 w-full cursor-pointer" role="menuitem" aria-label="Cycle accent color">
          <span id="swatch-dot" class="w-3.5 h-3.5 rounded-full shrink-0 border border-w-20" style="background: rgb(30,80,180);"></span>
          Accent color
        </button>
      </div>
    </div>
  </div>

  <article class="max-w-[680px]" itemscope itemtype="http://schema.org/BlogPosting">

    <header class="mb-10">
      <time class="block text-[10px] font-normal uppercase tracking-wider text-muted mb-3"
            datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {%- assign date_format = "%B %-d, %Y" -%}
        {{ page.date | date: date_format }}
      </time>
      <h1 class="text-3xl font-semibold text-primary leading-tight m-0" itemprop="name headline">
        {{ page.title | escape }}
      </h1>
      {% if page.description %}
      <p class="text-muted text-base leading-relaxed mt-3 mb-0">{{ page.description | escape }}</p>
      {% endif %}
    </header>

    <div class="post-content" itemprop="articleBody">
      {{ content }}
    </div>

    <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
  </article>

</main>

<script src="{{ 'assets/js/post.js' | relative_url }}" type="module"></script>
