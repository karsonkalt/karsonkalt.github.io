title: Karson Kalt
author:
  name: Karson Kalt
  email: karson@karsonkalt.dev

baseurl: ""

collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: notes
    values:
      layout: post

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - node_modules
  - assets/ts
  - assets/css/input.css
  - postcss.config.js
  - webpack.config.js
  - package.json
  - package-lock.json
  - tsconfig.json
